version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "python"
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
